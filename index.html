<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYFLIX PRO - Cinema em Casa</title>
    <style>
        :root { 
            --primary: #e50914; 
            --bg: #050505; 
            --card-bg: #141414; 
            --text: #ffffff;
            --accent: #ff0a16;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: auto; padding: 20px; }
        
        /* Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 30px;
        }

        .logo { font-size: 2.5rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .logo span { color: #fff; }

        .search-box { display: flex; flex-grow: 1; max-width: 600px; margin: 0 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        select { background: #111; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 5px 0 0 5px; outline: none; }
        input { flex-grow: 1; padding: 12px 20px; border: 1px solid #333; border-left: none; background: #111; color: #fff; outline: none; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 0 5px 5px 0; cursor: pointer; font-weight: bold; }

        /* Grid de Filmes */
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,1)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .movie-card p { font-size: 0.95rem; margin: 0; font-weight: 500; text-align: center; }

        /* MODAL DO PLAYER (A MUDANÇA PRINCIPAL) */
        #player-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none; /* Escondido por padrão */
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }

        #player-modal.active { display: flex; opacity: 1; }

        .modal-content {
            width: 90%; max-width: 1000px;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        #player-modal.active .modal-content { transform: scale(1); }

        .close-modal {
            position: absolute; top: 15px; right: 20px;
            font-size: 35px; color: #fff; cursor: pointer;
            z-index: 1010; transition: 0.2s; line-height: 1;
        }
        .close-modal:hover { color: var(--primary); transform: scale(1.2); }

        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .modal-body { padding: 25px; max-height: 60vh; overflow-y: auto; }

        .server-list { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .btn-server { background: #222; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
        .btn-server.active { background: var(--primary); border-color: var(--primary); }

        /* Estilo das Temporadas e Episódios */
        .series-nav-header { 
            background: #1a1a1a; color: #fff; border: none; padding: 15px; border-radius: 8px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }

        #series-panel { display: none; margin-top: 15px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; border-bottom: 1px solid #222; }
        .btn-season { background: transparent; color: #aaa; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-season.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .btn-episode { 
            background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 5px; 
            border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.8rem;
        }
        .btn-episode:hover { border-color: var(--primary); }
        .btn-episode.active { background: var(--primary); border-color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="#" class="logo" onclick="location.reload()">MY<span>FLIX</span></a>
        <div class="search-box">
            <select id="searchType">
                <option value="movie">Filmes</option>
                <option value="tv">Séries</option>
            </select>
            <input type="text" id="searchInput" placeholder="O que vamos ver hoje?">
            <button class="btn-search" onclick="searchContent()">BUSCAR</button>
        </div>
    </header>

    <h2 id="section-title">Em Destaque</h2>
    <div id="results"></div>
</div>

<!-- O NOVO MODAL -->
<div id="player-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        
        <div class="player-wrapper">
            <iframe id="mainPlayer" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="modal-body">
            <div class="server-list">
                <button class="btn-server active" onclick="changeServer('vidsrc', this)">Opção 1</button>
                <button class="btn-server" onclick="changeServer('2embed', this)">Opção 2</button>
                <button class="btn-server" onclick="changeServer('myembed', this)">Opção 3</button>
            </div>

            <div id="series-nav" class="hidden">
                <button class="series-nav-header" onclick="toggleSeriesPanel()">
                    <span>📅 TEMPORADAS E EPISÓDIOS</span>
                    <span>▼</span>
                </button>
                
                <div id="series-panel">
                    <div class="season-tabs" id="season-tabs"></div>
                    <div class="episode-grid" id="episode-grid"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = '832a40f6d7edf386b7ad6810de3570c9';
    let currentTmdbId, currentType, currentServer = 'vidsrc', currentS = 1, currentE = 1;

    window.onload = loadTrending;

    async function loadTrending() {
        const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results);
    }

    async function searchContent() {
        const query = document.getElementById('searchInput').value;
        const type = document.getElementById('searchType').value;
        if (!query) return;
        const url = `https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results, type);
    }

    function displayResults(results, forcedType = null) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        results.forEach(item => {
            if (!item.poster_path) return;
            const type = forcedType || item.media_type || (item.title ? 'movie' : 'tv');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}"><div class="movie-info"><p>${item.title || item.name}</p></div>`;
            card.onclick = () => openPlayer(item.id, type);
            container.appendChild(card);
        });
    }

    async function openPlayer(id, type) {
        currentTmdbId = id;
        currentType = type;
        currentS = 1; currentE = 1;

        const modal = document.getElementById('player-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);

        if (type === 'tv') {
            document.getElementById('series-nav').classList.remove('hidden');
            await loadSeasons(id);
        } else {
            document.getElementById('series-nav').classList.add('hidden');
        }

        updateIframe();
    }

    async function loadSeasons(id) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const tabs = document.getElementById('season-tabs');
        tabs.innerHTML = '';

        data.seasons.filter(s => s.season_number > 0).forEach(s => {
            const btn = document.createElement('button');
            btn.className = `btn-season ${s.season_number === 1 ? 'active' : ''}`;
            btn.innerText = `Temp. ${s.season_number}`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-season').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadEpisodes(id, s.season_number);
            };
            tabs.appendChild(btn);
        });
        loadEpisodes(id, 1);
    }

    async function loadEpisodes(id, sNum) {
        currentS = sNum;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const grid = document.getElementById('episode-grid');
        grid.innerHTML = '';

        data.episodes.forEach(e => {
            const btn = document.createElement('button');
            btn.className = `btn-episode ${e.episode_number === currentE ? 'active' : ''}`;
            btn.innerText = `EP ${e.episode_number}`;
            btn.onclick = () => {
                currentE = e.episode_number;
                document.querySelectorAll('.btn-episode').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateIframe();
            };
            grid.appendChild(btn);
        });
    }

    function toggleSeriesPanel() {
        const panel = document.getElementById('series-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function changeServer(server, btn) {
        document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentServer = server;
        updateIframe();
    }

    function updateIframe() {
        const player = document.getElementById('mainPlayer');
        let url = '';
        if (currentServer === 'vidsrc') {
            url = currentType === 'movie' ? `https://vidsrc.to/embed/movie/${currentTmdbId}` : `https://vidsrc.to/embed/tv/${currentTmdbId}/${currentS}/${currentE}`;
        } else if (currentServer === '2embed') {
            url = currentType === 'movie' ? `https://www.2embed.cc/embed/${currentTmdbId}` : `https://www.2embed.cc/embedtv/${currentTmdbId}&s=${currentS}&e=${currentE}`;
        } else {
            url = currentType === 'movie' ? `https://myembed.biz/filme/${currentTmdbId}` : `https://myembed.biz/serie/${currentTmdbId}/${currentS}/${currentE}`;
        }
        player.src = url;
    }

    function closePlayer() {
        const modal = document.getElementById('player-modal');
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            document.getElementById('series-panel').style.display = 'none';
        }, 300);
    }
</script>

</body>
</html>
