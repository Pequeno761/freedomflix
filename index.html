<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYFLIX Ultra - Experiência Premium</title>
    <style>
        :root { 
            --primary: #e50914; 
            --bg: #050505; 
            --card-bg: #111111; 
            --text: #ffffff;
            --glass: rgba(20, 20, 20, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: auto; padding: 20px; }
        
        /* Header Luxuoso */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 30px 0; margin-bottom: 20px;
        }

        .logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1.5px; }
        .logo span { color: #fff; }

        .search-box { 
            display: flex; flex-grow: 1; max-width: 500px; margin: 0 40px; 
            background: rgba(255,255,255,0.05); border-radius: 50px; padding: 5px 15px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .search-box:focus-within { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        
        select { background: transparent; color: #aaa; border: none; padding: 10px; cursor: pointer; outline: none; font-size: 0.9rem; }
        input { flex-grow: 1; padding: 10px; border: none; background: transparent; color: #fff; outline: none; font-size: 1rem; }
        .btn-search { background: transparent; color: var(--primary); border: none; padding: 10px; cursor: pointer; font-size: 1.2rem; }

        /* Grade de Conteúdo */
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-top: 20px; }
        .movie-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; border: 1px solid var(--border);
        }
        .movie-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { 
            padding: 20px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            position: absolute; bottom: 0; width: 100%; box-sizing: border-box; 
        }
        .movie-card p { font-size: 0.9rem; margin: 0; font-weight: 600; text-align: center; color: #eee; }

        /* NOVO PLAYER MODAL - ESTILO PREMIUM */
        #player-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #player-modal.active { display: flex; opacity: 1; }

        .modal-content {
            width: 95%; max-width: 1200px; height: 90vh;
            background: var(--glass);
            border-radius: 20px; overflow: hidden;
            position: relative; border: 1px solid var(--border);
            transform: translateY(50px); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        #player-modal.active .modal-content { transform: translateY(0); }

        .close-modal {
            position: absolute; top: 20px; right: 25px;
            width: 45px; height: 45px; background: rgba(0,0,0,0.5);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff; cursor: pointer; z-index: 2100;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .close-modal:hover { background: var(--primary); transform: rotate(90deg); }

        /* Área do Vídeo */
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Área de Detalhes */
        .modal-scroll { flex-grow: 1; overflow-y: auto; padding: 40px; scrollbar-width: thin; }
        
        .movie-header { display: flex; gap: 30px; margin-bottom: 30px; }
        .mini-poster { width: 150px; border-radius: 10px; border: 1px solid var(--border); display: none; }
        
        .movie-details h2 { margin: 0 0 10px; font-size: 2.2rem; font-weight: 800; }
        .movie-meta { display: flex; gap: 15px; color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        .movie-overview { color: #bbb; line-height: 1.6; font-size: 1rem; max-width: 800px; margin-bottom: 30px; }

        /* Controles */
        .server-selector { display: flex; gap: 12px; margin-bottom: 30px; }
        .btn-server { 
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); 
            padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-server.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }

        /* Navegação de Séries Profissional */
        .series-section { margin-top: 20px; }
        .season-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .btn-season { 
            background: transparent; color: #888; border: none; padding: 10px 0; 
            cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-season.active { color: #fff; border-bottom: 3px solid var(--primary); }

        .episode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .btn-episode { 
            background: rgba(255,255,255,0.03); color: #eee; border: 1px solid var(--border); 
            padding: 20px 10px; border-radius: 10px; cursor: pointer; text-align: center; 
            transition: 0.3s; font-size: 0.85rem;
        }
        .btn-episode:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .btn-episode.active { background: var(--primary); border-color: var(--primary); font-weight: bold; }

        .hidden { display: none; }
        h2#section-title { font-weight: 700; color: #fff; letter-spacing: -0.5px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="#" class="logo" onclick="location.reload()">MY<span>FLIX</span></a>
        <div class="search-box">
            <select id="searchType">
                <option value="movie">Filmes</option>
                <option value="tv">Séries</option>
            </select>
            <input type="text" id="searchInput" placeholder="Busque por títulos, gêneros...">
            <button class="btn-search" onclick="searchContent()">🔍</button>
        </div>
    </header>

    <h2 id="section-title">Populares no MYFLIX</h2>
    <div id="results"></div>
</div>

<!-- PLAYER MODAL ULTRA -->
<div id="player-modal">
    <div class="modal-content">
        <div class="close-modal" onclick="closePlayer()">×</div>
        
        <div class="player-wrapper">
            <iframe id="mainPlayer" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="modal-scroll">
            <div class="movie-header">
                <img id="modal-poster" class="mini-poster" src="" alt="Poster">
                <div class="movie-details">
                    <h2 id="modal-title">Título do Filme</h2>
                    <div class="movie-meta">
                        <span id="modal-year">2024</span>
                        <span id="modal-rating">⭐ 8.5</span>
                        <span id="modal-type">FILME</span>
                    </div>
                    <p id="modal-overview" class="movie-overview">Sinopse carregando...</p>

                    <div class="server-selector">
                        <button class="btn-server active" onclick="changeServer('vidsrc', this)">OPÇÃO 1</button>
                        <button class="btn-server" onclick="changeServer('2embed', this)">OPÇÃO 2</button>
                        <button class="btn-server" onclick="changeServer('myembed', this)">OPÇÃO 3</button>
                    </div>
                </div>
            </div>

            <!-- Navegação de Séries -->
            <div id="series-section" class="hidden">
                <div class="season-tabs" id="season-tabs"></div>
                <div class="episode-grid" id="episode-grid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = '832a40f6d7edf386b7ad6810de3570c9';
    let currentTmdbId, currentType, currentServer = 'vidsrc', currentS = 1, currentE = 1;

    window.onload = loadTrending;

    async function loadTrending() {
        const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results);
    }

    async function searchContent() {
        const query = document.getElementById('searchInput').value;
        const type = document.getElementById('searchType').value;
        if (!query) return;
        const url = `https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results, type);
    }

    function displayResults(results, forcedType = null) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        results.forEach(item => {
            if (!item.poster_path) return;
            const type = forcedType || item.media_type || (item.title ? 'movie' : 'tv');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                <div class="movie-info"><p>${item.title || item.name}</p></div>
            `;
            card.onclick = () => openPlayer(item, type);
            container.appendChild(card);
        });
    }

    async function openPlayer(item, type) {
        currentTmdbId = item.id;
        currentType = type;
        currentS = 1; currentE = 1;

        // Preencher Detalhes
        document.getElementById('modal-title').innerText = item.title || item.name;
        document.getElementById('modal-year').innerText = (item.release_date || item.first_air_date || '----').split('-')[0];
        document.getElementById('modal-rating').innerText = `⭐ ${item.vote_average.toFixed(1)}`;
        document.getElementById('modal-type').innerText = type.toUpperCase();
        document.getElementById('modal-overview').innerText = item.overview || "Nenhuma sinopse disponível.";
        document.getElementById('modal-poster').src = `https://image.tmdb.org/t/p/w200${item.poster_path}`;
        document.getElementById('modal-poster').style.display = 'block';

        // Abrir Modal
        const modal = document.getElementById('player-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 50);

        if (type === 'tv') {
            document.getElementById('series-section').classList.remove('hidden');
            await loadSeasons(item.id);
        } else {
            document.getElementById('series-section').classList.add('hidden');
        }

        updateIframe();
    }

    async function loadSeasons(id) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const tabs = document.getElementById('season-tabs');
        tabs.innerHTML = '';

        data.seasons.filter(s => s.season_number > 0).forEach(s => {
            const btn = document.createElement('button');
            btn.className = `btn-season ${s.season_number === 1 ? 'active' : ''}`;
            btn.innerText = `Temp. ${s.season_number}`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-season').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadEpisodes(id, s.season_number);
            };
            tabs.appendChild(btn);
        });
        loadEpisodes(id, 1);
    }

    async function loadEpisodes(id, sNum) {
        currentS = sNum;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const grid = document.getElementById('episode-grid');
        grid.innerHTML = '';

        data.episodes.forEach(e => {
            const btn = document.createElement('button');
            btn.className = `btn-episode ${e.episode_number === currentE ? 'active' : ''}`;
            btn.innerText = `EP ${e.episode_number}`;
            btn.onclick = () => {
                currentE = e.episode_number;
                document.querySelectorAll('.btn-episode').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateIframe();
                document.querySelector('.modal-content').scrollTo({ top: 0, behavior: 'smooth' });
            };
            grid.appendChild(btn);
        });
    }

    function changeServer(server, btn) {
        document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentServer = server;
        updateIframe();
    }

    function updateIframe() {
        const player = document.getElementById('mainPlayer');
        let url = '';
        if (currentServer === 'vidsrc') {
            url = currentType === 'movie' ? `https://vidsrc.to/embed/movie/${currentTmdbId}` : `https://vidsrc.to/embed/tv/${currentTmdbId}/${currentS}/${currentE}`;
        } else if (currentServer === '2embed') {
            url = currentType === 'movie' ? `https://www.2embed.cc/embed/${currentTmdbId}` : `https://www.2embed.cc/embedtv/${currentTmdbId}&s=${currentS}&e=${currentE}`;
        } else {
            url = currentType === 'movie' ? `https://myembed.biz/filme/${currentTmdbId}` : `https://myembed.biz/serie/${currentTmdbId}/${currentS}/${currentE}`;
        }
        player.src = url;
    }

    function closePlayer() {
        const modal = document.getElementById('player-modal');
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
            document.getElementById('mainPlayer').src = '';
        }, 400);
    }
</script>

</body>
</html>
