<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYFLIX PRO - Streaming Inteligente</title>
    <style>
        :root { 
            --primary: #e50914; 
            --bg: #0a0a0a; 
            --card-bg: #141414; 
            --text: #ffffff;
            --accent: #b20710;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: auto; padding: 20px; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0;
            margin-bottom: 30px; 
            border-bottom: 1px solid #222;
        }

        .logo { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--primary); 
            text-decoration: none;
            letter-spacing: -1px;
        }
        .logo span { color: #fff; }

        .search-box { 
            display: flex; 
            gap: 0; 
            flex-grow: 1; 
            max-width: 700px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        select {
            background: #111; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 5px 0 0 5px;
        }

        input { 
            flex-grow: 1; padding: 12px 20px; border: 1px solid #333; border-left: none; background: #111; color: #fff; font-size: 1rem; outline: none;
        }

        .btn-search { 
            background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 0 5px 5px 0; cursor: pointer; font-weight: bold;
        }

        h2 { margin: 30px 0 20px; font-weight: 500; font-size: 1.5rem; color: #aaa; }

        #results { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; 
        }

        .movie-card { 
            background: var(--card-bg); border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 0.4s; position: relative;
        }
        .movie-card:hover { transform: scale(1.1); z-index: 10; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .movie-info {
            padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; opacity: 0; transition: 0.3s;
        }
        .movie-card:hover .movie-info { opacity: 1; }
        .movie-card p { font-size: 0.9rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }

        #player-section { display: none; margin-top: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .player-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); border-bottom: 5px solid var(--primary);
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .player-controls {
            background: #1a1a1a; padding: 20px; border-radius: 0 0 12px 12px; display: flex; flex-direction: column; gap: 20px;
        }

        .server-selector { display: flex; gap: 10px; justify-content: center; }
        
        .btn-server { 
            background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
        }
        .btn-server.active { background: var(--primary); }

        /* Estilos de Séries Modernos */
        .series-nav-btn {
            background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; margin-top: 10px; transition: 0.3s;
        }
        .series-nav-btn:hover { background: #333; border-color: var(--primary); }

        #series-panel { 
            background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-top: 20px; display: none; 
        }

        .season-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: thin; }
        .btn-season { 
            background: #222; color: #fff; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap;
        }
        .btn-season.active { background: var(--primary); border-color: var(--primary); }

        .episode-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 10px;
        }
        .btn-episode { 
            background: #1a1a1a; color: #ccc; border: 1px solid #222; padding: 15px 10px; border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.85rem; transition: 0.2s;
        }
        .btn-episode:hover { border-color: var(--primary); color: #fff; background: #222; }
        .btn-episode.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .hidden { display: none; }
        #local-warning { background: #e5091422; color: #ff4d4d; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid var(--primary); }
        .back-btn { background: transparent; color: #aaa; border: 1px solid #333; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px; }

    </style>
</head>
<body>

<div class="container">
    <div id="local-warning" style="display:none;">
        <strong>⚠️ AVISO:</strong> Rodando localmente. Se falhar, use a <strong>Opção 2 ou 3</strong>.
    </div>

    <header>
        <a href="#" class="logo" onclick="loadTrending()">MY<span>FLIX</span></a>
        <div class="search-box">
            <select id="searchType">
                <option value="movie">Filmes</option>
                <option value="tv">Séries</option>
            </select>
            <input type="text" id="searchInput" placeholder="O que vamos assistir?">
            <button class="btn-search" onclick="searchContent()">BUSCAR</button>
        </div>
    </header>

    <h2 id="section-title">Populares no Momento</h2>
    <div id="results"></div>

    <div id="player-section">
        <div class="player-wrapper">
            <iframe id="mainPlayer" allowfullscreen scrolling="no" referrerpolicy="origin" allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="player-controls">
            <div class="server-selector">
                <button class="btn-server active" onclick="changeServer('vidsrc', this)">Opção 1</button>
                <button class="btn-server" onclick="changeServer('2embed', this)">Opção 2</button>
                <button class="btn-server" onclick="changeServer('myembed', this)">Opção 3</button>
            </div>

            <!-- Navegação de Séries -->
            <div id="series-nav-container" class="hidden">
                <button class="series-nav-btn" onclick="toggleSeriesPanel()">
                    📅 TEMPORADAS / EPISÓDIOS
                </button>
                
                <div id="series-panel">
                    <div class="season-list" id="season-list">
                        <!-- Temporadas aqui -->
                    </div>
                    <div class="episode-grid" id="episode-list">
                        <!-- Episódios aqui -->
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="back-btn" onclick="closePlayer()">← VOLTAR PARA A VITRINE</button>
                <p id="debug-info" style="font-size: 0.7rem; color: #444; margin: 0;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = '832a40f6d7edf386b7ad6810de3570c9';
    let currentTmdbId = '';
    let currentType = 'movie';
    let currentServer = 'vidsrc';
    let currentS = 1;
    let currentE = 1;

    window.onload = () => {
        if (window.location.protocol === 'file:') document.getElementById('local-warning').style.display = 'block';
        loadTrending();
    };

    async function loadTrending() {
        document.getElementById('section-title').innerText = "Populares no Momento";
        const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results);
    }

    async function searchContent() {
        const query = document.getElementById('searchInput').value;
        const type = document.getElementById('searchType').value;
        if (!query) return;
        const url = `https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
        const res = await fetch(url);
        const data = await res.json();
        displayResults(data.results, type);
    }

    function displayResults(results, forcedType = null) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        document.getElementById('player-section').style.display = 'none';
        container.classList.remove('hidden');

        results.forEach(item => {
            if (!item.poster_path) return;
            const type = forcedType || item.media_type || (item.title ? 'movie' : 'tv');
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}"><div class="movie-info"><p>${item.title || item.name}</p></div>`;
            card.onclick = () => preparePlayer(item.id, type);
            container.appendChild(card);
        });
    }

    async function preparePlayer(tmdbId, type) {
        currentTmdbId = tmdbId;
        currentType = type;
        currentS = 1;
        currentE = 1;

        document.getElementById('results').classList.add('hidden');
        document.getElementById('player-section').style.display = 'block';
        
        if (type === 'tv') {
            document.getElementById('series-nav-container').classList.remove('hidden');
            await loadSeasons(tmdbId);
        } else {
            document.getElementById('series-nav-container').classList.add('hidden');
        }

        updateIframe();
    }

    async function loadSeasons(id) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const seasonContainer = document.getElementById('season-list');
        seasonContainer.innerHTML = '';

        data.seasons.forEach(s => {
            if (s.season_number === 0) return; // Ignorar especiais
            const btn = document.createElement('button');
            btn.className = `btn-season ${s.season_number === 1 ? 'active' : ''}`;
            btn.innerText = `Temp. ${s.season_number}`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-season').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadEpisodes(id, s.season_number);
            };
            seasonContainer.appendChild(btn);
        });
        loadEpisodes(id, 1);
    }

    async function loadEpisodes(id, seasonNum) {
        currentS = seasonNum;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${seasonNum}?api_key=${API_KEY}&language=pt-BR`);
        const data = await res.json();
        const epContainer = document.getElementById('episode-list');
        epContainer.innerHTML = '';

        data.episodes.forEach(e => {
            const btn = document.createElement('button');
            btn.className = `btn-episode ${e.episode_number === currentE ? 'active' : ''}`;
            btn.innerHTML = `<strong>EP ${e.episode_number}</strong><br><small>${e.name}</small>`;
            btn.onclick = () => {
                currentE = e.episode_number;
                document.querySelectorAll('.btn-episode').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateIframe();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            epContainer.appendChild(btn);
        });
    }

    function toggleSeriesPanel() {
        const panel = document.getElementById('series-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function changeServer(server, btn) {
        document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentServer = server;
        updateIframe();
    }

    function updateIframe() {
        const player = document.getElementById('mainPlayer');
        let url = '';

        if (currentServer === 'vidsrc') {
            url = currentType === 'movie' 
                ? `https://vidsrc.to/embed/movie/${currentTmdbId}` 
                : `https://vidsrc.to/embed/tv/${currentTmdbId}/${currentS}/${currentE}`;
        } else if (currentServer === '2embed') {
            url = currentType === 'movie'
                ? `https://www.2embed.cc/embed/${currentTmdbId}`
                : `https://www.2embed.cc/embedtv/${currentTmdbId}&s=${currentS}&e=${currentE}`;
        } else {
            url = currentType === 'movie' 
                ? `https://myembed.biz/filme/${currentTmdbId}` 
                : `https://myembed.biz/serie/${currentTmdbId}/${currentS}/${currentE}`;
        }

        player.src = url;
        document.getElementById('debug-info').innerText = `S${currentS}:E${currentE} | ${currentServer}`;
    }

    function closePlayer() {
        document.getElementById('player-section').style.display = 'none';
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('mainPlayer').src = '';
        document.getElementById('series-panel').style.display = 'none';
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchContent();
    });
</script>

</body>
</html>
