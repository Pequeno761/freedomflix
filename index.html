<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYFLIX PRO - Streaming Inteligente</title>
<style>
:root { 
--primary: #e50914; 
--bg: #0a0a0a; 
--card-bg: #141414; 
--text: #ffffff;
--accent: #b20710;
}

body { 
background: var(--bg); 
color: var(--text); 
font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
margin: 0; 
padding: 0;
overflow-x: hidden;
zoom: 0.75; /* Efeito de zoom 75% */
}

.container { max-width: 1400px; margin: auto; padding: 20px; }

/* Header Modernizado */
header { 
display: flex; 
justify-content: space-between; 
align-items: center; 
padding: 20px 0;
margin-bottom: 30px; 
border-bottom: 1px solid #222;
}

.logo { 
font-size: 2.5rem; 
font-weight: 900; 
color: var(--primary); 
text-decoration: none;
letter-spacing: -1px;
}
.logo span { color: #fff; }

.search-box { 
display: flex; 
gap: 0; 
flex-grow: 1; 
max-width: 700px; 
box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

select {
background: #111;
color: #fff;
border: 1px solid #333;
padding: 12px;
border-radius: 5px 0 0 5px;
cursor: pointer;
}

input { 
flex-grow: 1; 
padding: 12px 20px; 
border: 1px solid #333; 
border-left: none;
background: #111; 
color: #fff; 
font-size: 1rem;
outline: none;
}

.btn-search { 
background: var(--primary); 
color: white; 
border: none; 
padding: 12px 25px; 
border-radius: 0 5px 5px 0; 
cursor: pointer; 
font-weight: bold; 
transition: 0.3s;
}
.btn-search:hover { background: var(--accent); }

/* Títulos de Seção */
h2 { margin: 30px 0 20px; font-weight: 500; font-size: 1.5rem; color: #aaa; }

/* Grid de Resultados */
#results { 
display: grid; 
grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
gap: 25px; 
}

.movie-card { 
background: var(--card-bg); 
border-radius: 6px; 
overflow: hidden; 
cursor: pointer; 
transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
position: relative;
}

.movie-card:hover { 
transform: scale(1.1); 
z-index: 10;
box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

.movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

.movie-info {
padding: 10px;
background: linear-gradient(transparent, rgba(0,0,0,0.9));
position: absolute;
bottom: 0;
width: 100%;
box-sizing: border-box;
opacity: 0;
transition: 0.3s;
}
.movie-card:hover .movie-info { opacity: 1; }

.movie-card p { 
font-size: 0.9rem; 
margin: 0; 
white-space: nowrap; 
overflow: hidden; 
text-overflow: ellipsis; 
text-align: center;
}

/* Seção do Player (Transformada em Modal Netflix) */
#player-section { 
    display: none; 
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
}

@keyframes modalShow { 
    from { opacity: 0; transform: scale(0.7) translateY(50px); } 
    to { opacity: 1; transform: scale(1) translateY(0); } 
}

.modal-content {
    background: #141414;
    width: 90%;
    max-width: 1000px;
    border-radius: 12px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,1);
    animation: modalShow 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    overflow: hidden;
    border: 1px solid #333;
}

.close-modal {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    font-family: Arial, sans-serif;
}

.close-modal:hover {
    background: var(--primary);
    transform: rotate(90deg);
}

.player-header {
    background: #141414;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
}

.player-wrapper { 
    position: relative; 
    width: 100%; 
    aspect-ratio: 16/9; 
    background: #000;
}

iframe { width: 100%; height: 100%; border: none; }

.server-selector { display: flex; gap: 8px; }

.btn-server { 
    background: #222; 
    color: #ccc; 
    border: 1px solid #444; 
    padding: 6px 14px; 
    border-radius: 4px; 
    cursor: pointer; 
    font-size: 0.75rem;
    transition: 0.2s;
}
.btn-server.active { background: var(--primary); border-color: var(--primary); color: white; }
.btn-server:hover:not(.active) { background: #333; border-color: #666; }

.tv-controls { display: flex; align-items: center; gap: 10px; color: #eee; font-size: 0.85rem; }
.tv-controls input { 
    width: 45px; 
    padding: 4px; 
    background: #222; 
    border: 1px solid #444; 
    border-radius: 4px; 
    text-align: center;
    color: white;
}

.hidden { display: none; }

#local-warning { 
background: #e5091422; 
color: #ff4d4d; 
padding: 15px; 
border-radius: 8px; 
margin-bottom: 20px; 
text-align: center;
border: 1px solid var(--primary);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

</style>
</head>
<body>

<div class="container">
<div id="local-warning" style="display:none;">
<strong>⚠️ AVISO DE COMPATIBILIDADE:</strong> Você está rodando via arquivo local. 
Se o vídeo não carregar ou der erro de "Acesso Proibido", tente a <strong>Opção 2 ou 3</strong>. 
Para melhor experiência, hospede este arquivo no GitHub/Vercel.
</div>

<header>
<a href="#" class="logo" onclick="loadTrending()">MY<span>FLIX</span></a>
<div class="search-box">
<select id="searchType">
<option value="movie">Filmes</option>
<option value="tv">Séries</option>
</select>
<input type="text" id="searchInput" placeholder="O que você quer assistir hoje?">
<button class="btn-search" onclick="searchContent()">BUSCAR</button>
</div>
</header>

<h2 id="section-title">Populares no Momento</h2>

<!-- Grid de Resultados -->
<div id="results"></div>

<!-- Seção do Player -->
<div id="player-section" onclick="if(event.target === this) closePlayer()">
    <div class="modal-content">
        <button class="close-modal" onclick="closePlayer()">×</button>
        
        <div class="player-header">
            <div class="tv-controls hidden" id="tvFields">
                <span>Temp: <input type="number" id="season" value="1" min="1" onchange="updateIframe()"></span>
                <span>Ep: <input type="number" id="episode" value="1" min="1" onchange="updateIframe()"></span>
            </div>

            <div class="server-selector">
                <button class="btn-server active" onclick="changeServer('vidsrc', this)">Opção 1</button>
                <button class="btn-server" onclick="changeServer('2embed', this)">Opção 2</button>
                <button class="btn-server" onclick="changeServer('embedmovies', this)">Opção 3</button>
            </div>
        </div>

        <div class="player-wrapper">
            <iframe id="mainPlayer" 
                allowfullscreen 
                scrolling="no" 
                referrerpolicy="origin" 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>
    </div>
</div>
</div>

<script>
const API_KEY = '832a40f6d7edf386b7ad6810de3570c9';
let currentImdbId = '';
let currentTmdbId = '';
let currentType = 'movie';
let currentServer = 'vidsrc';

// Inicialização
window.onload = () => {
if (window.location.protocol === 'file:') {
document.getElementById('local-warning').style.display = 'block';
}
loadTrending();
};

// Carregar Populares
async function loadTrending() {
document.getElementById('section-title').innerText = "Populares no Momento";
const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
const res = await fetch(url);
const data = await res.json();
displayResults(data.results);
}

async function searchContent() {
const query = document.getElementById('searchInput').value;
const type = document.getElementById('searchType').value;
if (!query) return;

document.getElementById('section-title').innerText = `Resultados para: ${query}`;
const url = `https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
const res = await fetch(url);
const data = await res.json();
displayResults(data.results, type);
}

function displayResults(results, forcedType = null) {
const container = document.getElementById('results');
container.innerHTML = '';
document.getElementById('player-section').style.display = 'none';
container.classList.remove('hidden');

results.forEach(item => {
if (!item.poster_path) return;
const type = forcedType || item.media_type || (item.title ? 'movie' : 'tv');

const card = document.createElement('div');
card.className = 'movie-card';
card.innerHTML = `
               <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${item.title || item.name}">
               <div class="movie-info">
                   <p>${item.title || item.name}</p>
               </div>
           `;
card.onclick = () => preparePlayer(item.id, type);
container.appendChild(card);
});
}

async function preparePlayer(tmdbId, type) {
    currentTmdbId = tmdbId;
    currentType = type;

    // Buscar ID IMDB para compatibilidade
    const url = `https://api.themoviedb.org/3/${type}/${tmdbId}/external_ids?api_key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    currentImdbId = data.imdb_id;

    document.getElementById('tvFields').classList.toggle('hidden', type !== 'tv');
    
    // Abrir o Modal
    const playerSection = document.getElementById('player-section');
    playerSection.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    updateIframe();
}

function closePlayer() {
    const playerSection = document.getElementById('player-section');
    const player = document.getElementById('mainPlayer');
    playerSection.style.display = 'none';
    player.src = ''; 
    document.body.style.overflow = 'auto';
}

function changeServer(server, btn) {
document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
currentServer = server;
updateIframe();
}

function updateIframe() {
const s = document.getElementById('season').value;
const e = document.getElementById('episode').value;
const player = document.getElementById('mainPlayer');
let url = '';

if (currentServer === 'vidsrc') {
url = currentType === 'movie' 
? `https://vidsrc.to/embed/movie/${currentTmdbId}` 
: `https://vidsrc.to/embed/tv/${currentTmdbId}/${s}/${e}`;
} else if (currentServer === '2embed') {
url = currentType === 'movie'
? `https://www.2embed.cc/embed/${currentTmdbId}`
: `https://www.2embed.cc/embedtv/${currentTmdbId}&s=${s}&e=${e}`;
} else {
            url = currentType === 'movie' 
                ? `https://myembed.biz/filme/${currentTmdbId}` 
                : `https://myembed.biz/serie/${currentTmdbId}/${s}/${e}`;
}

player.src = url;
}
</script>
</body>
</html>
